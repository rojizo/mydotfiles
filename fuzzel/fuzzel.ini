# Fuzzel – lanzador de aplicaciones para niri
# Reemplaza rofi. Invocado con Mod+Space.
# Documentación: https://codeberg.org/dnkl/fuzzel

[main]
font=MesloLGS Nerd Font Mono:size=14
dpi-aware=yes
prompt=❯ 
terminal=foot
layer=overlay
lines=10
width=40
horizontal-pad=20
vertical-pad=8
inner-pad=4
image-size-ratio=0.5
anchor=center
# Activa modo oscuro automáticamente
# match-mode=fzf   # descomenta para búsqueda difusa estilo fzf

[colors]
background=1c1c1fee
text=ffffffff
match=33ccffff
selection=33ccff33
selection-text=ffffffff
selection-match=33ccffff
border=33ccffff

[border]
width=2
radius=12

[dmenu]
# En modo --dmenu la salida va a stdout
exit-immediately-if-empty=no
